name: CI
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  actions: read
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_protected && 'protected' || '' }}
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run affected targets
        if: ${{ !github.ref_protected }}
        run: pnpm exec nx affected -t lint typecheck test build --base=origin/main
      - name: Run all targets
        if: ${{ github.ref_protected }}
        run: pnpm exec nx run-many -t lint typecheck test build
