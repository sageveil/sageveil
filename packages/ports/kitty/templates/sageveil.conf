# sageveil — minimalist low-contrast, green-tinted colorscheme for kitty
# https://sw.kovidgoyal.net/kitty/conf/#color-table

foreground              <%= it.ansi.base.white %>
background              <%= it.ansi.base.black %>
selection_foreground    <%= it.ansi.base.white %>
selection_background    <%= it.extras.highlight %>

cursor                  <%= it.extras.cursor %>
cursor_text_color       <%= it.extras.cursor_text %>

url_color               <%= it.ansi.base.cyan %>

# Window borders
active_border_color     <%= it.ansi.base.green %>
inactive_border_color   <%= it.extras.border %>
bell_border_color       <%= it.ansi.base.yellow %>

# Tab bar
active_tab_foreground   <%= it.ansi.base.black %>
active_tab_background   <%= it.ansi.base.green %>
inactive_tab_foreground <%= it.extras.muted %>
inactive_tab_background <%= it.extras.surface %>
tab_bar_background      <%= it.extras.surface %>

# Marks
mark1_foreground        <%= it.ansi.base.black %>
mark1_background        <%= it.ansi.base.magenta %>
mark2_foreground        <%= it.ansi.base.black %>
mark2_background        <%= it.ansi.base.cyan %>
mark3_foreground        <%= it.ansi.base.black %>
mark3_background        <%= it.ansi.base.yellow %>

# Normal (ANSI 0-7)
color0  <%= it.ansi.base.black %>
color1  <%= it.ansi.base.red %>
color2  <%= it.ansi.base.green %>
color3  <%= it.ansi.base.yellow %>
color4  <%= it.ansi.base.blue %>
color5  <%= it.ansi.base.magenta %>
color6  <%= it.ansi.base.cyan %>
color7  <%= it.ansi.base.white %>

# Bright (ANSI 8-15)
color8  <%= it.ansi.bright.black %>
color9  <%= it.ansi.bright.red %>
color10 <%= it.ansi.bright.green %>
color11 <%= it.ansi.bright.yellow %>
color12 <%= it.ansi.bright.blue %>
color13 <%= it.ansi.bright.magenta %>
color14 <%= it.ansi.bright.cyan %>
color15 <%= it.ansi.bright.white %>
